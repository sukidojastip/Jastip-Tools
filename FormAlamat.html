<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Isi Alamat Pengiriman - Sukido Jastip</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--acc:#e91e8c;--grn:#059669;--red:#e11d48;--fn:'DM Sans',sans-serif;}
body{font-family:var(--fn);background:#f5f7ff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.wrap{width:100%;max-width:480px;}
.hdr{text-align:center;margin-bottom:24px;}
.logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#e91e8c,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px;box-shadow:0 4px 16px rgba(233,30,140,.3);}
.hdr h1{font-size:18px;font-weight:800;color:#1e2235;}
.hdr p{font-size:13px;color:#6b7280;margin-top:4px;}
.card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.07),0 8px 24px rgba(0,0,0,.06);margin-bottom:16px;}
.preview{background:#f5f3ff;border:1.5px solid #ddd6fe;border-radius:10px;padding:14px;margin-bottom:20px;}
.prev-title{font-size:11px;font-weight:700;color:#7c3aed;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.prev-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;color:#374151;}
.prev-item:before{content:'•';color:#e91e8c;font-size:16px;}
.stitle{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.fl{margin-bottom:14px;}
.fl label{display:block;font-size:11px;font-weight:700;color:#6b7280;margin-bottom:5px;letter-spacing:.4px;text-transform:uppercase;}
.fl input,.fl textarea{width:100%;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:9px;padding:10px 12px;color:#1e2235;font-family:var(--fn);font-size:14px;outline:none;transition:all .2s;}
.fl input:focus,.fl textarea:focus{border-color:var(--acc);background:#fff;box-shadow:0 0 0 3px rgba(233,30,140,.1);}
.fl textarea{resize:vertical;min-height:80px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.submitbtn{width:100%;padding:14px;background:linear-gradient(135deg,#e91e8c,#7c3aed);border:none;border-radius:11px;color:#fff;font-family:var(--fn);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(233,30,140,.28);transition:opacity .2s,transform .1s;}
.submitbtn:hover{opacity:.9;}.submitbtn:active{transform:scale(.98);}
.submitbtn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.submitbtn:disabled{opacity:.6;cursor:not-allowed;}
.success{display:none;text-align:center;padding:32px 24px;}
.sico{font-size:56px;margin-bottom:16px;}
.success h2{font-size:20px;font-weight:800;color:#1e2235;margin-bottom:8px;}
.success p{font-size:14px;color:#6b7280;line-height:1.5;}
.errmsg{display:none;background:#fff1f2;border:1px solid #fecaca;border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:#e11d48;font-weight:600;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="logo">🐱</div>
    <h1>Sukido Jastip</h1>
    <p>Isi data pengiriman kamu ya!</p>
  </div>

  <div id="main-card" class="card">
    <div id="order-preview" class="preview" style="display:none">
      <div class="prev-title">📦 Pesananmu</div>
      <div id="prev-items"></div>
    </div>
    <div class="errmsg" id="errmsg"></div>
    <div class="stitle">Data Penerima</div>
    <div class="fl"><label>Nama Lengkap Penerima</label><input id="f-nama" placeholder="Nama sesuai alamat pengiriman"/></div>
    <div class="fl"><label>Nomor HP / WhatsApp</label><input id="f-hp" type="tel" placeholder="08xx-xxxx-xxxx"/></div>
    <div class="fl"><label>Alamat Lengkap</label><textarea id="f-alamat" placeholder="Nama jalan, nomor rumah, RT/RW, kelurahan, kecamatan..."></textarea></div>
    <div class="g2">
      <div class="fl"><label>Kota / Kabupaten</label><input id="f-kota" placeholder="e.g. Nganjuk"/></div>
      <div class="fl"><label>Provinsi</label><input id="f-prov" placeholder="e.g. Jawa Timur"/></div>
    </div>
    <div class="fl"><label>Kode Pos</label><input id="f-kodepos" type="number" placeholder="e.g. 64272"/></div>
    <div class="fl"><label>Catatan Pengiriman (opsional)</label><input id="f-catatan" placeholder="e.g. Titip di pos satpam..."/></div>
    <button class="submitbtn" id="submitbtn" onclick="submit()">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Kirim Data Alamat
    </button>
  </div>

  <div id="success-card" class="card" style="display:none">
    <div class="success">
      <div class="sico">✅</div>
      <h2>Alamat Terkirim!</h2>
      <p>Data alamatmu sudah kami terima.<br/>Barangmu akan segera kami proses untuk pengiriman.<br/><br/>Terima kasih sudah belanja di <strong>Sukido Jastip</strong>! 🐱</p>
    </div>
  </div>
</div>

<script>
function gp(name){return new URL(window.location.href).searchParams.get(name)||'';}

const custName=decodeURIComponent(gp('custName'));

window.onload=function(){
  if(custName) document.getElementById('f-nama').value=custName;
  const items=gp('items');
  if(items){
    try{
      const list=JSON.parse(decodeURIComponent(items));
      if(list.length){
        document.getElementById('order-preview').style.display='block';
        document.getElementById('prev-items').innerHTML=list.map(i=>`<div class="prev-item">${i}</div>`).join('');
      }
    }catch(e){}
  }
};

function showErr(m){const el=document.getElementById('errmsg');el.textContent=m;el.style.display='block';setTimeout(()=>el.style.display='none',4000);}

function submit(){
  const nama=document.getElementById('f-nama').value.trim();
  const hp=document.getElementById('f-hp').value.trim();
  const alamat=document.getElementById('f-alamat').value.trim();
  const kota=document.getElementById('f-kota').value.trim();
  const provinsi=document.getElementById('f-prov').value.trim();
  const kodepos=document.getElementById('f-kodepos').value.trim();
  const catatan=document.getElementById('f-catatan').value.trim();

  if(!nama){showErr('⚠️ Nama lengkap wajib diisi');return;}
  if(!hp){showErr('⚠️ Nomor HP wajib diisi');return;}
  if(!alamat){showErr('⚠️ Alamat lengkap wajib diisi');return;}
  if(!kota){showErr('⚠️ Kota wajib diisi');return;}
  if(!kodepos){showErr('⚠️ Kode pos wajib diisi');return;}

  const btn=document.getElementById('submitbtn');btn.disabled=true;btn.textContent='Mengirim...';

  const data={nama,hp,alamat,kota,provinsi,kodepos,catatan,custName,timestamp:new Date().toISOString()};

  // Simpan ke localStorage dengan key yang dikenali SukidoJastip.html
  // Key: alamat_cust_namalengkap_tanpaspasi_lowercase
  const key='alamat_cust_'+custName.trim().toLowerCase().replace(/\s+/g,'_');
  try{localStorage.setItem(key,JSON.stringify(data));}catch(e){}

  // Tampilkan sukses
  document.getElementById('main-card').style.display='none';
  document.getElementById('success-card').style.display='block';
}
</script>
</body>
</html>
